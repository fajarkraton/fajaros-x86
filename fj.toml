[project]
name = "fajaros-nova"
version = "2.0.0"
description = "FajarOS Nova v2.0.0 Absolute — x86_64 OS in Fajar Lang (37K LOC, 280+ commands, 139 modules)"
authors = ["Fajar <fajar@primecore.id>"]
license = "MIT"

[build]
target = "x86_64-unknown-none"
entry = "kernel/main.fj"
output = "build/fajaros.elf"
optimization = "release"

[build.linker]
script = "linker.ld"
entry = "_start"

[build.bare-metal]
no-std = true
no-libc = true
static-link = true
