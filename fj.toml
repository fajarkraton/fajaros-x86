[project]
name = "fajaros-nova"
version = "0.6.0"
description = "FajarOS Nova v0.6.0 Ascension — x86_64 OS in Fajar Lang (9.6K LOC, 148 commands)"
authors = ["Fajar <fajar@primecore.id>"]
license = "MIT"

[build]
target = "x86_64-unknown-none"
entry = "kernel/main.fj"
output = "build/fajaros.elf"
optimization = "release"

[build.linker]
script = "linker.ld"
entry = "_start"

[build.bare-metal]
no-std = true
no-libc = true
static-link = true
